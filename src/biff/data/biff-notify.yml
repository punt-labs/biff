name: Biff CI Notifications
on:
  workflow_run:
    types: [completed]

jobs:
  notify:
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .biff
      - uses: astral-sh/setup-uv@v5
      - run: >-
          uvx punt-biff --user github-actions wall
          "CI failed: ${{ github.event.workflow_run.name }} on ${{ github.event.workflow_run.head_branch }} — ${{ github.event.workflow_run.html_url }}"
          --duration 2h
